<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holcim Executive | Inteligentna Platforma Zarządzania</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-sidebar: #002949; 
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-sidebar: #ffffff;
            --text-sidebar-muted: #94a3b8;
            --primary: #002949;
            --accent: #22c55e; 
            --accent-gradient: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            --vacation-gradient: linear-gradient(135deg, #ff7700 0%, #ff5500 100%);
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
            --sidebar-width: 300px;
            --alert-danger-bg: #fef2f2;
            --alert-danger-text: #991b1b;
        }

        [data-theme="dark"] {
            --bg-body: #0b0f19;
            --bg-card: #1e293b;
            --bg-sidebar: #030712;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --shadow-md: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            --alert-danger-bg: #451a03;
            --alert-danger-text: #fef08a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
        }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-sidebar);
            padding: 35px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 100;
            box-shadow: 5px 0 30px rgba(0,0,0,0.2);
        }

        .logo-area { font-size: 1.6rem; font-weight: 900; color: var(--text-sidebar); letter-spacing: -1px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .logo-area span { color: var(--accent); }
        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .menu-category { font-size: 0.7rem; font-weight: 800; color: var(--text-sidebar-muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 5px 12px; opacity: 0.6; }

        .menu-item { padding: 14px 18px; border-radius: 14px; font-weight: 600; font-size: 0.95rem; color: var(--text-sidebar-muted); display: flex; align-items: center; gap: 14px; cursor: pointer; }
        .menu-item:hover { color: #ffffff; background: rgba(255,255,255,0.04); transform: translateX(4px); }
        .menu-item.active { background: var(--accent-gradient); color: #ffffff; box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.4); }

        .sidebar-footer { border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 20px; font-size: 0.8rem; color: var(--text-sidebar-muted); display: flex; justify-content: space-between; }

        /* --- MAIN AREA --- */
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 40px; width: calc(100% - var(--sidebar-width)); }
        .top-navbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 24px; }
        .page-title h1 { font-size: 2rem; font-weight: 900; letter-spacing: -0.75px; }
        .top-actions { display: flex; align-items: center; gap: 16px; }

        .search-input, .theme-toggle, .current-time, .premium-select, .btn-action, .date-picker-input { background: var(--bg-card); border: 1px solid var(--border-color); padding: 14px 22px; border-radius: 16px; font-size: 0.9rem; font-weight: 600; color: var(--text-main); box-shadow: var(--shadow-sm); outline: none; }
        .theme-toggle, .btn-action { cursor: pointer; }
        .theme-toggle:hover, .premium-select:hover, .btn-action:hover, .date-picker-input:hover { background: var(--bg-body); }
        .btn-action.primary-btn { background: var(--accent-gradient); color: white; border: none; }
        .search-input { width: 280px; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(34,197,94,0.1); }

        /* --- NOTIFICATION CENTER --- */
        .notification-center { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; margin-bottom: 30px; box-shadow: var(--shadow-sm); }
        .notification-title { font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .notification-list { display: flex; flex-direction: column; gap: 8px; }
        .notification-item.alert-danger { background: var(--alert-danger-bg); color: var(--alert-danger-text); border-left: 4px solid #ef4444; }
        .notification-item.alert-info { background: #f0fdf4; color: #166534; border-left: 4px solid #22c55e; }

        /* --- CONTROLS BAR --- */
        .controls-bar { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 30px; background: var(--bg-card); padding: 20px; border-radius: 20px; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); align-items: center; }
        .premium-select { padding: 12px 20px; min-width: 220px; cursor: pointer; }
        .filter-tabs { display: flex; gap: 8px; background: var(--bg-body); padding: 4px; border-radius: 12px; }
        .filter-tab { padding: 8px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 700; cursor: pointer; border: none; background: transparent; color: var(--text-muted); }
        .filter-tab.active { background: var(--bg-card); color: var(--text-main); box-shadow: var(--shadow-sm); }

        /* --- PANEL WYBORU DOWOLNEGO DNIA Z KALENDARZA --- */
        .day-picker-box { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 24px; box-shadow: var(--shadow-sm); margin-bottom: 30px; display: flex; align-items: center; gap: 16px; }
        .date-picker-input { padding: 12px 24px; font-size: 1rem; color: var(--text-main); cursor: pointer; border-color: var(--border-color); font-weight: 700; width: 220px; text-align: center; }
        .date-picker-input:focus { border-color: var(--primary); }

        /* --- SECTIONS --- */
        .view-section { display: none; animation: fadeIn 0.4s ease-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }

        /* --- CARDS --- */
        .card { background: var(--bg-card); border-radius: 24px; padding: 28px; border: 1px solid var(--border-color); box-shadow: var(--shadow-md); display: flex; flex-direction: column; gap: 20px; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-5px); }
        
        .card.on-vacation-now { border-color: #ff5500; background: linear-gradient(180deg, var(--bg-card) 0%, rgba(255, 85, 0, 0.05) 100%); animation: pulseVacation 2.5s infinite alternate; }
        @keyframes pulseVacation { from { box-shadow: 0 15px 30px rgba(255, 85, 0, 0.05); } to { box-shadow: 0 15px 40px rgba(255, 85, 0, 0.2); } }

        .countdown-board
